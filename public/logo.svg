<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <!-- Top line (desk top) -->
  <line x1="40" y1="40" x2="160" y2="40" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>

  <!-- Curved text SEAT-MANAGER -->
  <defs>
    <path id="textArc" d="M 55,95 A 55,55 0 0,1 145,95" fill="none"/>
  </defs>
  <text font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e" letter-spacing="2">
    <textPath href="#textArc" startOffset="50%" text-anchor="middle">SEAT-MANAGER</textPath>
  </text>

  <!-- Bottom line (desk bottom) -->
  <line x1="55" y1="105" x2="145" y2="105" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
</svg>
